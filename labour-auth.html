<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labour Portal – Selvi Furniture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --red: #e53935;
            --red-dark: #b71c1c;
            --red-light: #ffebee;
            --white: #ffffff;
            --gray: #9e9e9e;
            --text: #1a1a1a;
            --radius: 14px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #fff 0%, #fff5f5 50%, #ffebee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-strip {
            height: 4px;
            background: linear-gradient(90deg, var(--red), var(--red-dark), var(--red));
            background-size: 400%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 0%
            }

            100% {
                background-position: 400%
            }
        }

        .page-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(229, 57, 53, .12), 0 4px 20px rgba(0, 0, 0, .06);
            padding: 44px 40px;
            width: 100%;
            max-width: 460px;
            animation: popIn .4s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes popIn {
            from {
                transform: scale(.9);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .card-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .card-logo .icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-logo .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-logo div h2 {
            font-size: 1rem;
            font-weight: 800;
        }

        .card-logo div p {
            font-size: .78rem;
            color: var(--gray);
        }

        /* Tab switcher */
        .tab-bar {
            display: flex;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-weight: 700;
            font-size: .88rem;
            border-radius: 9px;
            cursor: pointer;
            transition: all .2s;
            color: var(--gray);
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
        }

        .tab.active {
            background: var(--white);
            color: var(--red);
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
        }

        label {
            display: block;
            font-size: .8rem;
            font-weight: 700;
            color: var(--gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .field {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: .95rem;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            background: #fafafa;
        }

        input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(229, 57, 53, .1);
            background: #fff;
        }

        input::placeholder {
            color: #ccc;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: #fff;
            box-shadow: 0 8px 24px rgba(229, 57, 53, .28);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(229, 57, 53, .38);
        }

        .msg {
            border-radius: 10px;
            padding: 11px 14px;
            font-size: .84rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
        }

        .msg.error {
            background: #fff0f0;
            color: var(--red);
            border-left: 3px solid var(--red);
        }

        .msg.success {
            background: #f1f8e9;
            color: #2e7d32;
            border-left: 3px solid #4caf50;
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            padding: 0;
            display: flex;
            align-items: center;
        }

        .eye-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .pw-wrap {
            position: relative;
        }

        a.back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--gray);
            font-size: .88rem;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: color .2s;
        }

        a.back-link:hover {
            color: var(--red);
        }

        .divider {
            text-align: center;
            color: var(--gray);
            font-size: .8rem;
            margin: 8px 0 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }
    </style>
</head>

<body>
    <div class="top-strip"></div>

    <div class="page-wrap">
        <div class="card">
            <div class="card-logo">
                <div class="icon"><img src="img-worker.png" alt="Labour" /></div>
                <div>
                    <h2>Labour Portal</h2>
                    <p>Selvi Furniture</p>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
                <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Error / success -->
            <div class="msg error" id="msg-error"></div>
            <div class="msg success" id="msg-success"></div>

            <!-- ── LOGIN FORM ── -->
            <div id="form-login">
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" />
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="login-password" placeholder="••••••••" />
                        <button class="eye-btn" type="button" onclick="togglePw('login-password',this)" data-show="0"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doLogin()">Login</button>
                <div class="divider" style="margin-top:18px;">or</div>
                <p style="text-align:center;color:var(--gray);font-size:.85rem;">Don't have an account? <span
                        style="color:var(--red);cursor:pointer;font-weight:700;"
                        onclick="switchTab('register')">Register here</span></p>
            </div>

            <!-- ── REGISTER FORM ── -->
            <div id="form-register" style="display:none;">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="e.g. Arjun Kumar" />
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="10-digit mobile number" maxlength="10" />
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" />
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="reg-password" placeholder="Create a password" />
                        <button class="eye-btn" type="button" onclick="togglePw('reg-password',this)" data-show="0"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    </div>
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="reg-confirm" placeholder="Repeat password" />
                        <button class="eye-btn" type="button" onclick="togglePw('reg-confirm',this)" data-show="0"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
            </div>

            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        /* helpers */
        function showErr(msg) { const el = document.getElementById('msg-error'); el.textContent = msg; el.style.display = 'block'; document.getElementById('msg-success').style.display = 'none'; }
        function showOk(msg) { const el = document.getElementById('msg-success'); el.textContent = msg; el.style.display = 'block'; document.getElementById('msg-error').style.display = 'none'; }
        function clearMsgs() { document.getElementById('msg-error').style.display = 'none'; document.getElementById('msg-success').style.display = 'none'; }
        function togglePw(id, btn) { const i = document.getElementById(id); const show = btn.dataset.show === '1'; i.type = show ? 'password' : 'text'; btn.dataset.show = show ? '0' : '1'; btn.innerHTML = show ? '<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' : '<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'; }

        function switchTab(tab) {
            clearMsgs();
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
        }

        function getUsers() { return JSON.parse(localStorage.getItem('selvi_labours') || '[]'); }
        function saveUsers(u) { localStorage.setItem('selvi_labours', JSON.stringify(u)); }

        function doLogin() {
            clearMsgs();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value;
            if (!email || !pass) { showErr('Please fill in all fields.'); return; }

            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === pass);
            if (!user) { showErr('Incorrect email or password.'); return; }

            localStorage.setItem('selvi_labour_session', JSON.stringify({ name: user.name, email: user.email, phone: user.phone, id: user.id }));
            localStorage.setItem('selvi_role', 'labour');
            window.location.href = 'labour-home.html';
        }

        function doRegister() {
            clearMsgs();
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim().toLowerCase();
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!name || !phone || !email || !pass || !confirm) { showErr('Please fill in all fields.'); return; }
            if (!/^\d{10}$/.test(phone)) { showErr('Phone number must be 10 digits.'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Enter a valid email address.'); return; }
            if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
            if (pass !== confirm) { showErr('Passwords do not match.'); return; }

            const users = getUsers();
            if (users.find(u => u.email === email)) { showErr('An account with this email already exists.'); return; }

            const newUser = {
                id: 'LAB' + Date.now(),
                name,
                phone,
                email,
                password: pass,
                initials: name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2),
                joinedAt: Date.now()
            };
            users.push(newUser);
            saveUsers(users);

            showOk('Account created! You can now login.');
            setTimeout(() => switchTab('login'), 1500);
        }

        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.getElementById('form-login').style.display !== 'none') doLogin();
            else doRegister();
        });
    </script>
</body>

</html>
